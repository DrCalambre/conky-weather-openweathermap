conky.config = {
color4 = "yellow",  -- Color amarillo
color7 = "ff8a00",  -- Color naranja
color8 = "77ccff",  -- Color azul claro
background=false,
update_interval = 1,
imlib_cache_flush_interval = 300,
total_run_times = 0,
alignment = "top_right",
gap_x = 10,
gap_y = 15,
minimum_width = 254,
minimum_height = 250,
maximum_width = 254,
double_buffer = true,
net_avg_samples = 1,
cpu_avg_samples = 1,
own_window = true,
own_window_type = "dock",
own_window_hints = "undecorated,sticky,skip_taskbar,skip_pager,below",
own_window_argb_visual = true,
own_window_argb_value = 80,  -- ajustá entre 80 y 150 a gusto
use_xft = true,
xftalpha = 0.7,
font = "DejaVu:size=9",
short_units = true,
draw_graph_borders = false,
default_bar_width  =60,
default_bar_height = 30,
lua_load = "~/.config/conky/scripts/moon_bar.lua",
lua_draw_hook_post = "draw_moon_bar",
}

conky.text = [[
${alignc}${font DejaVu:bold:size=9}antiX${font}
${voffset -5}${alignc}${font DejaVu:bold:size=11}${exec disp=${DISPLAY#:}; disp=${disp%.[0-9]}; cat $HOME/.desktop-session/desktop-code.$disp 2>/dev/null}${font}
# -----------------------#
#         TIME           #
# -----------------------#
${voffset -3}${font LCD2:bold:size=48}${alignc 8}${color4}${time %k}${voffset -20}:${voffset 20}${time %M}${font}${color}
${voffset -3}${alignc}${font DejaVu:bold:size=11}${color4}${time %A %d de %B}${color}${font}
# --- current Station--- #
${voffset -3}${alignc}${font DejaVu:bold:size=9}${alignc 8}${color8}${execpi 3600 ~/.config/conky/scripts/GetStation.sh | awk -F";" '{print "${color8}"$1 "${color7} " $5 "${color8} " $3}'}${color}${font}
# --- current and next Station--- #
${image ~/.cache/current_station.png -p 0,110 -s 60x60}
${image ~/.cache/next_station.png -p 190,110 -s 60x60}
${voffset -30}${alignc}Uptime: $uptime
# Parent Directory ~/.config/conky/
# -----------------------#
# Call api openeathermap #
#    every six minutes   #
# -----------------------#
${execi 360 ~/.config/conky/scripts/openWeatherMap-weather.sh}

# -----------------------#
# Call Open-Meteo UV     #
#    every five minutes  #
# -----------------------#
${execi 300 ~/.config/conky/scripts/openMeteo-uv.sh}
# -----------------------------#
# Call Open-Meteo UV (hourly)  #
#    Every 30 minutes  #
# -----------------------------#
${execi 1800 ~/.config/conky/scripts/openMeteo-uv-hourly.sh}
# --- city ---#
${font Roboto Light :bold:size=12}${voffset -65}${alignc}${execi 1800 cat ~/.cache/openweathermap.json | jq -r .name}${voffset 10}${font}
# --- UTC date weather API json (dt UTC) ---#
${voffset -8}${alignc}${color4}Clima:${color} ${font :bold:size=8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .dt | awk '{print strftime("%c",$1)}' | cut -b 1-22}hs${font}${color}
# --- Sunrise / Sunset ---#
# --- Luz restante amanecer / atardecer ---#
${voffset -2}${alignc}${color4}Amanecer: ${color}${font LCDMono:bold:size=9}${execi 1800 cat ~/.cache/openweathermap.json | jq -r .sys.sunrise | awk '{print strftime("%H:%M:%S",$1)}'} ${alignc}${font}${color4}${voffset -3}${font Material Design Icons:size=12}${voffset -1}${font}${font LCDMono:bold:size=9} ${color}${exec ~/.config/conky/scripts/horas_luz.sh --sunrise "$(cat ~/.cache/openweathermap.json | jq -r .sys.sunset | awk '{print strftime("%H:%M:%S",$1)}')" "$(cat ~/.cache/openweathermap.json | jq -r .sys.sunrise | awk '{print strftime("%H:%M:%S",$1)}')"}${font}
${voffset -2}${alignc}${color4}Atardecer: ${color}${font LCDMono:bold:size=9}${execi 1800 cat ~/.cache/openweathermap.json | jq -r .sys.sunset | awk '{print strftime("%H:%M:%S",$1)}'} ${alignc}${font}${color4}${voffset -3}${font Material Design Icons:size=12}${voffset -1}${font}${font LCDMono:bold:size=9} ${color}${exec ~/.config/conky/scripts/horas_luz.sh --sunset "$(cat ~/.cache/openweathermap.json | jq -r .sys.sunset | awk '{print strftime("%H:%M:%S",$1)}')" "$(cat ~/.cache/openweathermap.json | jq -r .sys.sunrise | awk '{print strftime("%H:%M:%S",$1)}')"}${font}
# --- UV Index --- #
${voffset -5}${alignc}${font Symbola:size=14}🔆${font} \
${color4}UV:${color} \
${font DejaVu:bold:size=9}\
${execi 300 sh -c '[ -f ~/.cache/uv.json ] && jq -r ".current.uv_index | tostring | .[0:3]" ~/.cache/uv.json'}\
${font} \
${font DejaVu:size=8}${color8}\
${execi 300 ~/.config/conky/scripts/uv_label.sh}\
${font}${color}
# --- UV Index Max Today--- #
${voffset -5}${alignc}${color4}${font DejaVu:bold:size=9}UV${font} \
${font DejaVu:bold:size=9}${color}\
${execi 1800 ~/.config/conky/scripts/uv_label_max_today.sh}
${font}${color}
# -----------------------#
#        Weather         #
# -----------------------#
# --- Weather icon current --- #
${voffset 55}${execi 360 ~/.config/conky/scripts/openWeatherMap-icon.sh $(cat ~/.cache/openweathermap.json | jq -r '.weather[0].icon') "current"}${image ~/.cache/openWeatherMap-icon.png -p 5,240 -s 100x100 -n}
# --- Textual weather condition (e.g. Partly cloudy) --- #
${voffset 15}${color8}${font Roboto Light:bold:size=14}${execi 360 cat ~/.cache/openweathermap.json | jq -r '.weather[0].description'}${font}
# --- Temperature --- #
${alignc}${voffset -70}${font VL PGothic :bold:size=17}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.temp | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}°${font VL PGothic :bold:size=15}C${font}${color}
# --- Feels like --- #
${color7}${alignr}${voffset -80}ST: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.feels_like | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}°C${font}${color}
# --- Temperature min --- #
${color7}${alignr}${voffset -1}min: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.temp_min | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}°C${font}${color}
# --- Temperature max --- #
${color7}${alignr}${voffset -1}max: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.temp_max | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}°C${font}${color}
# --- wind speed --- #
${color7}${alignr}${voffset -1}Viento: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .wind.speed | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'}km/h${font}${color}
# --- wind gust --- #
${color7}${alignr}${voffset -1}ráfagas: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .wind.gust | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'}km/h${font}${color}
# --- pressure --- #
${color7}${alignr}${voffset 5}presión: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.pressure } hPa${font}${color}
# --- humidity --- #
${color7}${alignr}${voffset -1}humedad: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .main.humidity }%${font}${color}
# --- visibility --- #
${color7}${alignr}${voffset -1}visibilidad: ${color8}${execi 360 cat ~/.cache/openweathermap.json | jq -r .visibility | awk '{visibility=$1 ; print visibility / 1000 ; }'}km${font}${color}
# ----------------------------------------------------------#
#         More info How to Convert Wind Directions in       #
#  https://www.campbellsci.de/blog/convert-wind-directions  #
# -------------  Degrees to Compass Directions ------------ #
#             wind direction icon compass current           #
# ----------------------------------------------------------#
${execi 360 ~/.config/conky/scripts/degrees.sh $(cat ~/.cache/openweathermap.json | jq -r '.wind.deg' | awk '{degrees=$1 ; printf "%.0f\n",degrees / 22.5; }') 'current'}${image ~/.cache/direction_compass-icon.png -p 104,245 -s 50x50 -n}
# --- direction textual compass current --- #
${alignc}${voffset -70}${color8}${font Symbola :bold:size=14}${execi 360 cat ~/.cache/direction_compass.txt}${font}${color}
# -----------------------------#
#        Extended Forecast     #
# -----------------------------#
# --- Weather icon cnt01 --- #
${execi 360 ~/.config/conky/scripts/openWeatherMap-icon.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[0].weather[0].icon') "cnt01"}${image ~/.cache/openWeatherMap-cnt01-icon.png -p 0,375 -s 50x50 -n}
# --- Weather icon cnt02 --- #
${execi 360 ~/.config/conky/scripts/openWeatherMap-icon.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[1].weather[0].icon') "cnt02"}${image ~/.cache/openWeatherMap-cnt02-icon.png -p 102,375 -s 50x50 -n}
# --- Weather icon cnt03 --- #
${execi 360 ~/.config/conky/scripts/openWeatherMap-icon.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[2].weather[0].icon') "cnt03"}${image ~/.cache/openWeatherMap-cnt03-icon.png -p 204,375 -s 50x50 -n}
# --- UTC date weather API json (cnt01) ---#
${voffset 28}${font LCD2:bold:size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs${font}${color}
# --- UTC date weather API json (cnt02) ---#
${voffset -22}${alignc}${font LCD2:bold:size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs${font}${color}
# --- UTC date weather API json (cnt03) ---#
${voffset -20}${alignr 7}${font LCD2:bold:size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs${font}${color}
# --- Temperature (cnt01) --- #
${voffset -7}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].main.temp | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].main.feels_like | awk '{temp=$1 ; printf "%.0f\n",temp ; }'})°C${font}${color}
# --- Temperature (cnt02) --- #
${voffset -20}${alignc}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].main.temp | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].main.feels_like | awk '{temp=$1 ; printf "%.0f\n",temp ; }'})°C${font}${color}
# --- Temperature (cnt03) --- #
${voffset -18}${alignr 7}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].main.temp | awk '{temp=$1 ; printf "%.0f\n",temp ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].main.feels_like | awk '{temp=$1 ; printf "%.0f\n",temp ; }'})°C${font}${color}
# --- wind speed (cnt01) --- #
${voffset -4}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].wind.speed | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].wind.gust | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'})km/h${font}${color}
# --- wind speed (cnt02) --- #
${voffset -20}${alignc}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].wind.speed | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].wind.gust | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'})km/h${font}${color}
# --- wind speed (cnt03) --- #
${voffset -20}${alignr 7}${font :size=8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].wind.speed | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'}(${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].wind.gust | awk '{wind=$1 ; printf "%.0f\n",wind * 3.6 ; }'})km/h${font}${color}
# --- Textual cnt weather condition (e.g. Partly cloudy) --- #
${voffset 60}${color7}${alignc}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[0].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs: ${color8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r '.list[0].weather[0].description'}${font}${color}
${voffset -3}${color7}${alignc}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[1].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs: ${color8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r '.list[1].weather[0].description'}${font}${color}
${voffset -3}${color7}${alignc}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r .list[2].dt | awk '{print strftime("%c",$1)}' | cut -b 17-22}hs: ${color8}${execi 360 cat ~/.cache/openweathermap-forecast.json | jq -r '.list[2].weather[0].description'}${font}${color}
# --- direction textual compass cnt01 --- #
${offset 1}${voffset -60}${color8}${font Symbola :bold:size=14}${execi 360 cat ~/.cache/direction_compass-cnt01.txt}${font}${color}
# --- direction textual compass cnt02 --- #
${alignc}${voffset -18}${color8}${font Symbola :bold:size=14}${execi 360 cat ~/.cache/direction_compass-cnt02.txt}${font}${color}
# --- direction textual compass cnt03 --- #
${alignr 10}${voffset -18}${color8}${font Symbola :bold:size=14}${execi 360 cat ~/.cache/direction_compass-cnt03.txt}${font}${color}
# --- wind direction icon compass cnt01 ---      #
${execi 360 ~/.config/conky/scripts/degrees.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[0].wind.deg' | awk '{degrees=$1 ; printf "%.0f\n",degrees / 22.5; }') 'cnt01'}${image ~/.cache/direction_compass-cnt01-icon.png -p 0,458 -s 50x50 -n}
# --- wind direction icon compass cnt02 ---      #
${execi 360 ~/.config/conky/scripts/degrees.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[1].wind.deg' | awk '{degrees=$1 ; printf "%.0f\n",degrees / 22.5; }') 'cnt02'}${image ~/.cache/direction_compass-cnt02-icon.png -p 102,458 -s 50x50 -n}
# --- wind direction icon compass cnt03 ---      #
${execi 360 ~/.config/conky/scripts/degrees.sh $(cat ~/.cache/openweathermap-forecast.json | jq -r '.list[2].wind.deg' | awk '{degrees=$1 ; printf "%.0f\n",degrees / 22.5; }') 'cnt03'}${image ~/.cache/direction_compass-cnt03-icon.png -p 204,458 -s 50x50 -n}
# -------- The Moon! ------- #
${voffset -5}${execi 600 bash ~/.config/conky/scripts/GetMoon.sh}
# --- FASE + ILUMINACIÓN ---
${color7}${font DejaVu:bold:size=10}\
${execi 180 sed -n '2p' ~/.cache/raw} \
${color4}${execi 180 grep 'Illumination' ~/.cache/raw | cut -d ':' -f2 | sed 's/^ *//g'}\
${color}${font}
${voffset 1}
# --- LUNA NUEVA ---
${color7}Nueva:${color} \
${font LCD2:bold:size=10}${color4}\
${execi 300 awk 'NR==4{printf " %s %s  %s", $1, $2, $3}' ~/.cache/moon_phase_die}\
${color}${font}
# --- LUNA LLENA ---
${color7}Llena:${color} \
${font LCD2:bold:size=10}${color4}\
${execi 300 awk 'NR==2{printf "  %s %s  %s", $1, $2, $3}' ~/.cache/moon_phase_die}\
${color}${font}
${image ~/.cache/moon.jpg -p 155,572 -s 100x100 -n}
# -----------------------#
#   hardware resources   #
# -----------------------#
${voffset -20}${cpugraph cpu1 30,254 00FF00 FF0000 -t}
${voffset -6}${cpugraph cpu2 30,254 00FF00 FF0000 -t}
${voffset -6}${cpugraph cpu3 30,254 00FF00 FF0000 -t}
${voffset -6}${cpugraph cpu4 30,254 00FF00 FF0000 -t}
${voffset -130}${font DejaVu:bold:size=11}${cpu cpu1}%${font}${goto 110}${freq 1} Mhz${font}
${voffset 12}${font DejaVu:bold:size=11}${cpu cpu2}%${font}${goto 110}${freq 2} Mhz${font}
${voffset 12}${font DejaVu:bold:size=11}${cpu cpu3}%${font}${goto 110}${freq 3} Mhz${font}
${voffset 12}${font DejaVu:bold:size=11}${cpu cpu4}%${font}${goto 110}${freq 4} Mhz${font}
${voffset 1}${color8}RAM: ${color}${font DejaVu:bold:size=9}${memperc}%${font}${goto 100}${color8}Free: ${color}${font DejaVu:bold:size=9}${memeasyfree}${font} ${color8}Used: ${color}${font DejaVu:bold:size=9}${mem}${font}
${color8}Root: ${color}${font DejaVu:bold:size=9}${fs_size /}${font}${goto 100}${color8}Free: ${color}${font DejaVu:bold:size=9}${fs_free /}${font} ${color8}Used: ${color}${font DejaVu:bold:size=9}${fs_used /}${font}
${color8}Home: ${color}${font DejaVu:bold:size=9}${fs_size /home/}${font}${goto 100}${color8}Free: ${color}${font DejaVu:bold:size=9}${fs_free /home/}${font} ${color8}Used: ${color}${font DejaVu:bold:size=9}${fs_used /home/}${font}
${color8}otros: ${color}${font DejaVu:bold:size=9}${fs_size /mnt/otros/}${font}${goto 100}${color8}Free: ${color}${font DejaVu:bold:size=9}${fs_free /mnt/otros/}${font} ${color8}Used: ${color}${font DejaVu:bold:size=9}${fs_used /mnt/otros/}${font}
${color8}Swap: ${color}${font DejaVu:bold:size=9}${swapperc}%${font}${goto 100}${color8}Free: ${color}${font DejaVu:bold:size=9}${swapfree}${font} ${color8}Used: ${color}${font DejaVu:bold:size=9}${swap}${font}
# -------------------------#
# hardware temperature CPU #
# -------------------------#
${alignc}${color8}Core 0: ${color4}${execi 10 sensors | grep 'Core 0' | awk '{print $3}'} ${color8}
${alignc}${color8}Core 1: ${color4}${execi 10 sensors | grep 'Core 1' | awk '{print $3}'} ${color8}
${alignc}${color8}Core 2: ${color4}${execi 10 sensors | grep 'Core 2' | awk '{print $3}'} ${color8}
${alignc}${color8}Core 3: ${color4}${execi 10 sensors | grep 'Core 3' | awk '{print $3}'} ${color8}
$alignc ${color7}${font Roboto Light :bold:size=10}eth0 IP: ${color8}${addr eth0}${font}
${color4}eth0 up: $alignr ${color4}${upspeed eth0}${color}
${voffset -10}${alignr}${upspeedgraph   eth0 10,254 000cdb 00ff16}
${color4}eth0 down: $alignr ${downspeed eth0}${color}
${voffset -}${alignr}${downspeedgraph eth0 10,254  000cdb 00ff16}
]]
